<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kibrindes — brindes personalizados. Fale com a gente e conheça nossos produtos.">
  <title>Kibrindes — Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #1e1b4b 0%, #4c1d95 55%, #7c3aed 100%);
      color: #f5f3ff;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #f5f3ff;
      color: #4c1d95;
      font-size: 44px;
      font-weight: 800;
      line-height: 96px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .bio {
      margin: 8px 0 32px;
      font-size: 15px;
      color: #ddd6fe;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .links a {
      display: block;
      padding: 16px 20px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #f5f3ff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .links a:hover,
    .links a:focus-visible {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-2px);
    }

    .links a span {
      margin-right: 8px;
    }

    footer {
      margin-top: 40px;
      font-size: 13px;
      color: #c4b5fd;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar" aria-hidden="true">K</div>
    <h1>Kibrindes</h1>
    <p class="bio">Brindes personalizados para sua marca.<br>Fale com a gente pelos links abaixo 👇</p>

    <nav class="links" aria-label="Links da Kibrindes">
      <!-- Edite os links abaixo: troque as URLs pelos endereços reais da loja -->
      <a href="https://wa.me/5500000000000" target="_blank" rel="noopener">
        <span>💬</span>WhatsApp
      </a>
      <a href="https://instagram.com/kibrindes" target="_blank" rel="noopener">
        <span>📸</span>Instagram
      </a>
      <a href="#" target="_blank" rel="noopener">
        <span>🎁</span>Catálogo de produtos
      </a>
      <a href="#" target="_blank" rel="noopener">
        <span>📍</span>Como chegar
      </a>
    </nav>

    <footer>© Kibrindes — todos os direitos reservados</footer>
  </main>
</body>
</html>
